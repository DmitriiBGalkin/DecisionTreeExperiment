<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tree 11</title>
<style>
:root {
  --tree-root-fill: #fff4cc;
  --tree-assets-fill: #fff4cc;
  --tree-denied-fill: #D3D3D3;
  --tree-approved-fill: #D3D3D3;
  --tree-stroke: #000;
  --tree-stroke-w: 2;
  --tree-text: #000;
}

html, body {
  margin: 0;
  padding: 0;
  background: #f7f7f7;
  font-family: Arial, sans-serif;
  color: #111827;
}

.page {
  padding: 24px;
}

h1 {
  font-size: 24px;
  margin: 0 0 16px;
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
  background: #fff;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 12px;
  box-sizing: border-box;
}

.card h2 {
  margin: 0 0 10px;
  font-size: 16px;
  text-align: center;
}

svg {
  display: block;
  width: 100%;
  height: auto;
  background: white;
}

@page {
  margin: 12mm;
}
</style>
</head>
<body>
  <div class="page">
    <h1>Tree 11</h1>
    <div class="grid">
      <section class="card">
        <h2>A</h2>
        <!DOCTYPE html>
<html>
<head><meta charset='utf-8'></head>
<body>
<svg preserveaspectratio="xMinYMid meet" style="background-color: white;" viewbox="-100 0 1200 450" xmlns="http://www.w3.org/2000/svg">
<style>
    .node-text { font-size: 1.2em; font-family: Arial; fill: black; text-anchor: middle; dominant-baseline: middle; }
    .branch-text-left { font-size: 1.2em; font-family: Arial; fill: black; text-anchor: end; dominant-baseline: middle; }
    .branch-text-right { font-size: 1.2em; font-family: Arial; fill: black; text-anchor: start; dominant-baseline: middle; }
  </style>
<!-- Level 1: Income -->
<ellipse cx="550" cy="60" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-root-fill, #ffffff);"></ellipse>
<text class="node-text" x="550" y="60">Income</text>
<!-- Level 1 Branches -->
<line stroke="black" stroke-width="2" x1="550" x2="300" y1="90" y2="150"></line>
<line stroke="black" stroke-width="2" x1="550" x2="800" y1="90" y2="150"></line>
<text class="branch-text-left" x="440" y="105">Below 40.000</text>
<text class="branch-text-right" x="660" y="105">40.000 and more</text>
<!-- Level 2 Left: Loan Amount -->
<ellipse cx="300" cy="150" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="300" y="150">Loan Amount</text>
<!-- Level 2 Right: Loan Amount -->
<ellipse cx="800" cy="150" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="800" y="150">Loan Amount</text>
<!-- Left Loan Amount Branches -->
<line stroke="black" stroke-width="2" x1="300" x2="200" y1="180" y2="250"></line>
<line stroke="black" stroke-width="2" x1="300" x2="400" y1="180" y2="250"></line>
<text class="branch-text-left" x="240" y="215">Below 10.000</text>
<text class="branch-text-right" x="360" y="215">10.000 and more</text>
<!-- Left High Loan Denied -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="350" y="250"></rect>
<text class="node-text" x="400" y="275">Denied</text>
<!-- Credit History Node -->
<ellipse cx="200" cy="275" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="200" y="275">Credit History</text>
<!-- Credit History Branches -->
<line stroke="black" stroke-width="2" x1="200" x2="125" y1="305" y2="370"></line>
<line stroke="black" stroke-width="2" x1="200" x2="275" y1="305" y2="370"></line>
<text class="branch-text-left" x="150" y="340">Bad</text>
<text class="branch-text-right" x="250" y="340">Good or Excellent</text>
<!-- Credit History Leaves -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="75" y="370"></rect>
<text class="node-text" x="125" y="395">Denied</text>
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-approved-fill, #ffffff);" width="100" x="250" y="370"></rect>
<text class="node-text" x="300" y="395">Approved</text>
<!-- Right Loan Amount Branches -->
<line stroke="black" stroke-width="2" x1="800" x2="700" y1="180" y2="250"></line>
<line stroke="black" stroke-width="2" x1="800" x2="900" y1="180" y2="250"></line>
<text class="branch-text-left" x="735" y="215">Below 30.000</text>
<text class="branch-text-right" x="865" y="215">30.000 and more</text>
<!-- Right High Loan Denied -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="850" y="250"></rect>
<text class="node-text" x="900" y="275">Denied</text>
<!-- Assets Node -->
<ellipse cx="700" cy="275" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="700" y="275">Assets</text>
<!-- Assets Branches -->
<line stroke="black" stroke-width="2" x1="700" x2="625" y1="305" y2="370"></line>
<line stroke="black" stroke-width="2" x1="700" x2="775" y1="305" y2="370"></line>
<text class="branch-text-left" x="650" y="340">Below 10.000</text>
<text class="branch-text-right" x="750" y="340">10.000 and more</text>
<!-- Asset Leaves -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="575" y="370"></rect>
<text class="node-text" x="625" y="395">Denied</text>
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-approved-fill, #ffffff);" width="100" x="750" y="370"></rect>
<text class="node-text" x="800" y="395">Approved</text>
</svg>
</body>
</html>
      </section>
