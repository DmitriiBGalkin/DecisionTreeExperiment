<style>
:root {
  --tree-root-fill: #fff4cc;

}

html, body {

  background: #f7f7f7;
  font-family: Arial, sans-serif;
  color: #111827;
}

.page {
  padding: 24px;
}

h1 {
  font-size: 24px;
  margin: 0 0 16px;
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
  background: #fff;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 12px;
  box-sizing: border-box;
}

.card h2 {
  margin: 0 0 10px;
  font-size: 16px;
  text-align: center;
}

svg {
  display: block;
  width: 100%;
  height: auto;
  background: white;
}

@page {
  margin: 12mm;
}
</style>
</head>
