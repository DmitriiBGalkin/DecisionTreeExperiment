<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tree 18</title>
<style>
:root {
  --tree-root-fill: #fff4cc;
  --tree-assets-fill: #fff4cc;
  --tree-denied-fill: #D3D3D3;
  --tree-approved-fill: #D3D3D3;
  --tree-stroke: #000;
  --tree-stroke-w: 2;
  --tree-text: #000;
}

html, body {
  margin: 0;
  padding: 0;
  background: #f7f7f7;
  font-family: Arial, sans-serif;
  color: #111827;
}

.page {
  padding: 24px;
}

h1 {
  font-size: 24px;
  margin: 0 0 16px;
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
  background: #fff;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 12px;
  box-sizing: border-box;
}

.card h2 {
  margin: 0 0 10px;
  font-size: 16px;
  text-align: center;
}

svg {
  display: block;
  width: 100%;
  height: auto;
  background: white;
}

@page {
  margin: 12mm;
}
</style>
</head>
<body>
  <div class="page">
    <h1>Tree 18</h1>
    <div class="grid">
      <section class="card">
        <h2>A</h2>
        <!DOCTYPE html>
<html>
<head><meta charset='utf-8'></head>
<body>
<svg preserveaspectratio="xMinYMid meet" style="background-color: white;" viewbox="70 0 1480 500" xmlns="http://www.w3.org/2000/svg">
<style>

<!-- Level 1: Employment Status -->
<ellipse cx="700" cy="60" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-root-fill, #ffffff);"></ellipse>
<text class="node-text" x="700" y="60">Employment</text>
<!-- Branches from Employment -->
<line stroke="black" stroke-width="2" x1="700" x2="250" y1="90" y2="150"></line>
<line stroke="black" stroke-width="2" x1="700" x2="1150" y1="90" y2="150"></line>

<!-- Level 2: Assets & Income -->

<line stroke="black" stroke-width="2" x1="250" x2="350" y1="180" y2="250"></line>

<text class="branch-text-right" x="290" y="200">10.000 and more</text>
<!-- Denied Leaf (low assets) -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="100" y="225"></rect>

<text class="node-text" x="250" y="360">Denied</text>

<text class="node-text" x="1340" y="470">Approved</text>
</svg>
