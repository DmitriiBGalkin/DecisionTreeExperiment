<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tree 16</title>
<style>
:root {
  --tree-root-fill: #fff4cc;
  --tree-assets-fill: #fff4cc;
  --tree-denied-fill: #D3D3D3;
  --tree-approved-fill: #D3D3D3;
  --tree-stroke: #000;
  --tree-stroke-w: 2;
  --tree-text: #000;
}

html, body {
  margin: 0;
  padding: 0;
  background: #f7f7f7;
  font-family: Arial, sans-serif;
  color: #111827;
}

.page {
  padding: 24px;
}

h1 {
  font-size: 24px;
  margin: 0 0 16px;
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
  background: #fff;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 12px;
  box-sizing: border-box;
}

.card h2 {
  margin: 0 0 10px;
  font-size: 16px;
  text-align: center;
}

svg {
  display: block;
  width: 100%;
  height: auto;
  background: white;
}

@page {
  margin: 12mm;
}
</style>
</head>
<body>
  <div class="page">
    <h1>Tree 16</h1>
    <div class="grid">
      <section class="card">
        <h2>A</h2>
        <!DOCTYPE html>
<html>
<head><meta charset='utf-8'></head>
<body>
<svg preserveaspectratio="xMinYMid meet" style="background-color: white;" viewbox="300 0 1100 500" xmlns="http://www.w3.org/2000/svg">
<style>
    .node-text { font-size: 1.2em; font-family: Arial; fill: black; text-anchor: middle; dominant-baseline: middle; }
    .branch-text-left { font-size: 1.2em; font-family: Arial; fill: black; text-anchor: end; dominant-baseline: middle; }
    .branch-text-right { font-size: 1.2em; font-family: Arial; fill: black; text-anchor: start; dominant-baseline: middle; }
  </style>
<!-- Level 1: Credit History -->
<ellipse cx="700" cy="60" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-root-fill, #ffffff);"></ellipse>
<text class="node-text" x="700" y="60">Credit History</text>
<!-- Level 1 branches -->
<line stroke="black" stroke-width="2" x1="700" x2="400" y1="90" y2="150"></line>
<line stroke="black" stroke-width="2" x1="700" x2="1000" y1="90" y2="150"></line>
<text class="branch-text-left" x="560" y="105">Bad</text>
<text class="branch-text-right" x="840" y="105">Good or Excellent</text>
<!-- Denied for bad credit -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="400" y="125"></rect>
<text class="node-text" x="450" y="150">Denied</text>
<!-- Level 2: Income -->
<ellipse cx="1000" cy="150" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="1000" y="150">Income</text>
<line stroke="black" stroke-width="2" x1="1000" x2="900" y1="180" y2="250"></line>
<line stroke="black" stroke-width="2" x1="1000" x2="1100" y1="180" y2="250"></line>
<text class="branch-text-left" x="950" y="205">Below 30.000</text>
<text class="branch-text-right" x="1050" y="205">30.000 and more</text>
<!-- Denied for low income -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="850" y="225"></rect>
<text class="node-text" x="900" y="250">Denied</text>
<!-- Level 3: Liabilities -->
<ellipse cx="1100" cy="250" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="1100" y="250">Liabilities</text>
<line stroke="black" stroke-width="2" x1="1100" x2="1020" y1="280" y2="350"></line>
<line stroke="black" stroke-width="2" x1="1100" x2="1180" y1="280" y2="350"></line>
<text class="branch-text-left" x="1060" y="305">Above 10.000</text>
<text class="branch-text-right" x="1140" y="305">Below 10.000</text>
<!-- Denied for high liabilities -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="970" y="325"></rect>
<text class="node-text" x="1020" y="350">Denied</text>
<!-- Level 4 Fork by credit status -->
<!-- LEFT FORK: GOOD credit → loan_amount check -->
<ellipse cx="1180" cy="350" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="1180" y="350">Loan Amount</text>
<line stroke="black" stroke-width="2" x1="1180" x2="1110" y1="380" y2="450"></line>
<line stroke="black" stroke-width="2" x1="1180" x2="1250" y1="380" y2="450"></line>
<text class="branch-text-left" x="1140" y="410">Below 25.000</text>
<text class="branch-text-right" x="1230" y="410">25.000 and more</text>
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-approved-fill, #ffffff);" width="100" x="1060" y="430"></rect>
<text class="node-text" x="1110" y="455">Approved</text>
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="1200" y="430"></rect>
<text class="node-text" x="1250" y="455">Denied</text>
<!-- RIGHT FORK (excellent credit): Combined check -->
<!-- You can interpret this as a special approval rule, maybe not visible but assumed: income vs. loan ratio -->
</svg>
</body>
</html>
      </section>

      </section>
    </div>
  </div>
</body>
