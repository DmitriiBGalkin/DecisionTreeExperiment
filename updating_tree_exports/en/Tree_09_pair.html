<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tree 9</title>
<style>
:root {
  --tree-root-fill: #fff4cc;
  --tree-assets-fill: #fff4cc;
  --tree-denied-fill: #D3D3D3;
  --tree-approved-fill: #D3D3D3;
  --tree-stroke: #000;
  --tree-stroke-w: 2;
  --tree-text: #000;
}

html, body {
  margin: 0;
  padding: 0;
  background: #f7f7f7;
  font-family: Arial, sans-serif;
  color: #111827;
}

.page {
  padding: 24px;
}

h1 {
  font-size: 24px;
  margin: 0 0 16px;
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
  background: #fff;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 12px;
  box-sizing: border-box;
}

.card h2 {
  margin: 0 0 10px;
  font-size: 16px;
  text-align: center;
}

svg {
  display: block;
  width: 100%;
  height: auto;
  background: white;
}

@page {
  margin: 12mm;
}
</style>
</head>
<body>
  <div class="page">
    <h1>Tree 9</h1>
    <div class="grid">
      <section class="card">
        <h2>A</h2>
        <!DOCTYPE html>
<html>
<head><meta charset='utf-8'></head>
<body>
<svg preserveaspectratio="xMinYMid meet" style="background-color: white;" viewbox="000 0 1300 400" xmlns="http://www.w3.org/2000/svg">
<style>
    .node-text { font-size: 1.2em; font-family: Arial; fill: black; text-anchor: middle; dominant-baseline: middle; }
    .branch-text-left { font-size: 1.2em; font-family: Arial; fill: black; text-anchor: end; dominant-baseline: middle; }
    .branch-text-right { font-size: 1.2em; font-family: Arial; fill: black; text-anchor: start; dominant-baseline: middle; }
  </style>
<!-- Level 1: Income -->
<ellipse cx="600" cy="60" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-root-fill, #ffffff);"></ellipse>
<text class="node-text" x="600" y="60">Income</text>
<!-- Branches from Income -->
<line stroke="black" stroke-width="2" x1="600" x2="300" y1="90" y2="150"></line>
<line stroke="black" stroke-width="2" x1="600" x2="900" y1="90" y2="150"></line>
<text class="branch-text-left" x="470" y="105">Below 50.000</text>
<text class="branch-text-right" x="730" y="105">50.000 and more</text>
<!-- Left Branch: Employment Status -->
<ellipse cx="300" cy="150" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="300" y="150">Employment</text>
<!-- Right Branch: Loan Amount -->
<ellipse cx="900" cy="150" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="900" y="150">Loan Amount</text>
<!-- Branches from Employment -->
<line stroke="black" stroke-width="2" x1="300" x2="200" y1="180" y2="250"></line>
<line stroke="black" stroke-width="2" x1="300" x2="400" y1="180" y2="250"></line>
<text class="branch-text-left" x="250" y="205">Unemployed</text>
<text class="branch-text-right" x="350" y="205">Employed</text>
<!-- Right leaf from stable = Approved -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-approved-fill, #ffffff);" width="100" x="150" y="225"></rect>
<text class="node-text" x="200" y="250">Denied</text>
<!-- Level 3: Assets (Unemployed) -->
<ellipse cx="400" cy="250" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="400" y="250">Liabilities</text>
<!-- Branches from Assets -->
<line stroke="black" stroke-width="2" x1="400" x2="300" y1="280" y2="360"></line>
<line stroke="black" stroke-width="2" x1="400" x2="500" y1="280" y2="360"></line>
<text class="branch-text-left" x="350" y="310">Below 10.000</text>
<text class="branch-text-right" x="450" y="310">10.000 and more</text>
<!-- Denied leaf -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-approved-fill, #ffffff);" width="100" x="250" y="335"></rect>
<text class="node-text" x="300" y="360">Approved</text>
<!-- Approved leaf -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="450" y="335"></rect>
<text class="node-text" x="500" y="360">Denied</text>
<!-- Branches from Loan Amount -->
<line stroke="black" stroke-width="2" x1="900" x2="800" y1="180" y2="250"></line>
<line stroke="black" stroke-width="2" x1="900" x2="1000" y1="180" y2="250"></line>
<text class="branch-text-left" x="850" y="205">Below 25.000</text>
<text class="branch-text-right" x="950" y="205">25.000 and more</text>
<!-- Small loan = Approved -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-approved-fill, #ffffff);" width="100" x="750" y="225"></rect>
<text class="node-text" x="800" y="250">Approved</text>
<!-- Level 3: Credit History -->
<ellipse cx="1000" cy="250" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="1000" y="250">Credit History</text>
<!-- Branches from Credit History -->
<line stroke="black" stroke-width="2" x1="1000" x2="925" y1="280" y2="360"></line>
<line stroke="black" stroke-width="2" x1="1000" x2="1075" y1="280" y2="360"></line>
<text class="branch-text-left" x="960" y="310">Excellent</text>
<text class="branch-text-right" x="1040" y="310">Good or Bad</text>
<!-- Leaves -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-approved-fill, #ffffff);" width="100" x="875" y="335"></rect>
<text class="node-text" x="925" y="360">Approved</text>
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="1050" y="335"></rect>
<text class="node-text" x="1100" y="360">Denied</text>
</svg>
</body>
</html>
      </section>

      </section>
    </div>
