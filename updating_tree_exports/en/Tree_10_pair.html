<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tree 10</title>
<style>
:root {
  --tree-root-fill: #fff4cc;
  --tree-assets-fill: #fff4cc;
  --tree-denied-fill: #D3D3D3;
  --tree-approved-fill: #D3D3D3;
  --tree-stroke: #000;
  --tree-stroke-w: 2;
  --tree-text: #000;
}

html, body {
  margin: 0;
  padding: 0;
  background: #f7f7f7;
  font-family: Arial, sans-serif;
  color: #111827;
}

.page {
  padding: 24px;
}

h1 {
  font-size: 24px;
  margin: 0 0 16px;
  border: 1px solid #ccc;
  padding: 10px;
  text-align: center;
  background: #fff;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

.card {
  background: #fff;
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  padding: 12px;
  box-sizing: border-box;
}

.card h2 {
  margin: 0 0 10px;
  font-size: 16px;
  text-align: center;
}

svg {
  display: block;
  width: 100%;
  height: auto;
  background: white;
}

@page {
  margin: 12mm;
}
</style>
</head>
<body>
  <div class="page">
    <h1>Tree 10</h1>
    <div class="grid">
      <section class="card">
        <h2>A</h2>
        <!DOCTYPE html>
<html>
<head><meta charset='utf-8'></head>
<body>
<svg preserveaspectratio="xMinYMid meet" style="background-color: white;" viewbox="000 0 1300 400" xmlns="http://www.w3.org/2000/svg">
<style>
    .node-text { font-size: 1.2em; font-family: Arial; fill: black; text-anchor: middle; dominant-baseline: middle; }
    .branch-text-left { font-size: 1.2em; font-family: Arial; fill: black; text-anchor: end; dominant-baseline: middle; }
    .branch-text-right { font-size: 1.2em; font-family: Arial; fill: black; text-anchor: start; dominant-baseline: middle; }
  </style>
<!-- Level 1: Loan Amount -->
<ellipse cx="650" cy="60" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-root-fill, #ffffff);"></ellipse>
<text class="node-text" x="650" y="60">Loan Amount</text>
<!-- Loan Amount Branches -->
<line stroke="black" stroke-width="2" x1="650" x2="350" y1="90" y2="150"></line>
<line stroke="black" stroke-width="2" x1="650" x2="950" y1="90" y2="150"></line>
<text class="branch-text-left" x="520" y="105">Below 12.000</text>
<text class="branch-text-right" x="770" y="105">12.000 and more</text>
<!-- LEFT SIDE: Small Loan Path -->
<!-- Level 2: Credit History -->
<ellipse cx="350" cy="150" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="350" y="150">Credit History</text>
<line stroke="black" stroke-width="2" x1="350" x2="250" y1="180" y2="250"></line>
<line stroke="black" stroke-width="2" x1="350" x2="450" y1="180" y2="250"></line>
<text class="branch-text-left" x="300" y="200">Bad</text>
<text class="branch-text-right" x="400" y="200">Good or Excellent</text>
<!-- Right path = Approved -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-approved-fill, #ffffff);" width="100" x="400" y="225"></rect>
<text class="node-text" x="450" y="250">Approved</text>
<!-- Left path: Check Liabilities -->
<ellipse cx="250" cy="250" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="250" y="250">Liabilities</text>
<line stroke="black" stroke-width="2" x1="250" x2="175" y1="280" y2="360"></line>
<line stroke="black" stroke-width="2" x1="250" x2="325" y1="280" y2="360"></line>
<text class="branch-text-left" x="210" y="300">Above 10.000</text>
<text class="branch-text-right" x="295" y="300">Below 10.000</text>
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="125" y="325"></rect>
<text class="node-text" x="175" y="350">Denied</text>
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-approved-fill, #ffffff);" width="100" x="280" y="325"></rect>
<text class="node-text" x="330" y="350">Approved</text>
<!-- RIGHT SIDE: Large Loan Path -->
<!-- Level 2: Employment Status -->
<ellipse cx="950" cy="150" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="950" y="150">Employment</text>
<line stroke="black" stroke-width="2" x1="950" x2="850" y1="180" y2="250"></line>
<line stroke="black" stroke-width="2" x1="950" x2="1050" y1="180" y2="250"></line>
<text class="branch-text-left" x="900" y="200">Unemployed</text>
<text class="branch-text-right" x="1000" y="200">Employed</text>
<!-- Left = Denied -->
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="800" y="225"></rect>
<text class="node-text" x="850" y="250">Denied</text>
<!-- Right: Check Assets -->
<ellipse cx="1050" cy="250" rx="80" ry="30" stroke="black" stroke-width="2" style="fill: var(--tree-assets-fill, #ffffff);"></ellipse>
<text class="node-text" x="1050" y="250">Assets</text>
<line stroke="black" stroke-width="2" x1="1050" x2="975" y1="280" y2="360"></line>
<line stroke="black" stroke-width="2" x1="1050" x2="1125" y1="280" y2="360"></line>
<text class="branch-text-left" x="1020" y="300">Below 10.000</text>
<text class="branch-text-right" x="1080" y="300">10.000 and more</text>
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-denied-fill, #ffffff);" width="100" x="925" y="325"></rect>
<text class="node-text" x="975" y="350">Denied</text>
<rect height="50" stroke="black" stroke-width="2" style="fill: var(--tree-approved-fill, #ffffff);" width="100" x="1080" y="325"></rect>
<text class="node-text" x="1130" y="350">Approved</text>
</svg>
</body>
</html>
      </section>
